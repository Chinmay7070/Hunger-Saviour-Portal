
<ng-container *ngIf="rest$ | async as restaurant">
    <div *ngIf="restaurant.menus">
           <div *ngFor="let menu of restaurant.menus" class="container d-flex flex-wrap 
                     align-items-center justify-content-center my-2">
            
            <div class="col-lg-7">
               <div class="d-flex flex-column">
                <div class="fw-bolder">
                    {{menu.menuItem}}
                </div>
                <div class="fw-bolder">
                    {{menu.price}}
                </div>
                <div class="d-flex flex-row fw-bold">
                      <mat-icon class="ratingicon">stars</mat-icon>{{restaurant?.rating}}
                </div>
                <div class="text-secondary m-1">
                    {{menu.description}}
                </div>
            </div>
            </div>
            <div class="col-lg-3">
                <div class="card-image-container">
                    <img  mat-cart-image src="{{menu.menuItemImageurl}}" alt="{{menu.menuItemImageurl}}">
                     <p>kkkkkkkkkkkkkkk</p>
                </div>
            </div>
            <div class="col-lg-2">
                    
                    <mat-card class="restaurant-card no-shadow">
                         <div class="card-image-container d-flex flex-wrap align-items-center justify-content-center">
                             <ng-container>
                                    <button mat-raised-button color="primary" class="fw-bold text-light" > Add To Cart</button> 
                             </ng-container>
                         </div>
                    </mat-card>
            
                    
            </div>
        </div>
    </div>
</ng-container>
